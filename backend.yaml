- name: configure backend server
  hosts: backend
  become: yes
  tasks:
  - name: disbale current nodejs
    ansible.builtin.command: dnf module disbale nodejs -y

  - name: enable nodejs 20
    ansible.builtin.command: dnf module enable nodejs:20 -yes

  - name: Install nodejs
    ansible.builtin.package:
      name: nodejs
      state: present

