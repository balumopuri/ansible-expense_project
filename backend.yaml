- name: configure backend server
  hosts: backend
  become: yes
  tasks:
  - name: disable current nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enable nodejs 20
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: Install nodejs
    ansible.builtin.package:
      name: "{{ item }}"
      state: present
    loop:
    - nodejs
    - mysql
  
  - name: Create Expense user 
    ansible.builtin.user:
      name: expense
    
  - name: Create a directory for ExpenseApp
    ansible.builtin.file:
      path: /app 
      state: directory
  
  - name: Download the configuration code
    ansible.builtin.get_url:
      url: https://expense-builds.s3.us-east-1.amazonaws.com/expense-backend-v2.zip
      dest: /tmp/backend.zip

  - name: Unzip backend code
    ansible.builtin.unarchive:
      src: /tmp/backend.zip
      dest: /app 
      remote_src: yes
  
  - name: Install the dependencies
    community.general.npm:
      path: /app

  - name: copying the backend.service
    ansible.builtin.copy:
      src: backend.service  
      dst: /etc/systemd/system/backend.service

  - name: import mysql data
    community.mysql.mysql_db:
      state: import
      name: all
      login_user: root
      login_password: ExpenseApp@1
      login_host: mysql.balaportfolio.space
      target: /app/schema/backend.sql



  
